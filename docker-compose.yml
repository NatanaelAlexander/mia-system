services:
  bd_main:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-mia_system}
    volumes:
      - mia_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mia_user} -d ${POSTGRES_DB:-mia_system}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: ./backend
    init: true
    # Entrypoint corre como root solo para fijar permisos en dist; el proceso queda como node (uid 1000).
    user: root
    entrypoint: ["/usr/local/bin/docker-entrypoint.dev.sh"]
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    command: sh -c "pnpm run start:dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=${DATABASE_URL:-postgresql://mia_user:changeme_dev_only@bd_main:5432/mia_system}
    depends_on:
      bd_main:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build: ./frontend
    init: true
    # Entrypoint corre como root solo para fijar permisos en .next; el proceso queda como node (uid 1000).
    user: root
    entrypoint: ["/usr/local/bin/docker-entrypoint.dev.sh"]
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "pnpm exec next dev --hostname 0.0.0.0 --port 3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      api:
        condition: service_healthy

volumes:
  mia_pg_data:
