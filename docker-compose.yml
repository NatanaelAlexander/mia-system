x-timezone: &timezone
  TZ: ${TZ:-America/Santiago}

services:
  bd_main:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      <<: *timezone
      PGTZ: ${PGTZ:-America/Santiago}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - mia_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  api:
    build: ./backend
    init: true
    env_file:
      - .env
    # Entrypoint corre como root solo para fijar permisos en dist; el proceso queda como node (uid 1000).
    user: root
    entrypoint: ["/usr/local/bin/docker-entrypoint.dev.sh"]
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    command: sh -c "pnpm run start:dev"
    environment:
      <<: *timezone
      CHOKIDAR_USEPOLLING: "true"
      DATABASE_URL: ${DATABASE_URL}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_SYSTEM: ${R2_BUCKET_SYSTEM}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN_PORTAL: ${JWT_ACCESS_EXPIRES_IN_PORTAL:-12h}
      JWT_ACCESS_EXPIRES_IN_INTERNAL: ${JWT_ACCESS_EXPIRES_IN_INTERNAL:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
    depends_on:
      bd_main:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build: ./frontend
    init: true
    # Entrypoint corre como root solo para fijar permisos en .next; el proceso queda como node (uid 1000).
    user: root
    entrypoint: ["/usr/local/bin/docker-entrypoint.dev.sh"]
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    # --webpack: Turbopack (default en Next 16) no detecta cambios bien en Docker/Windows.
    command: sh -c "echo '' && echo '----------------------------------------' && echo '  BD    →  localhost:'$${POSTGRES_PORT:-5432} && echo '----------------------------------------' && echo '  Back  →  http://localhost:3000' && echo '----------------------------------------' && echo '  Front →  http://localhost:3001' && echo '----------------------------------------' && echo '' && pnpm exec next dev --webpack --hostname 0.0.0.0 --port 3000"
    environment:
      <<: *timezone
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy

volumes:
  mia_pg_data:
